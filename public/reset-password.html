<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password - Project02</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">
  <div class="max-w-md w-full bg-white rounded-3xl shadow-2xl p-10 mx-4">
    <div class="text-center mb-10">
      <h1 class="text-4xl font-bold text-blue-600">Project02</h1>
      <p class="text-gray-600 mt-3">Create a new password</p>
    </div>

    <!-- Error Message -->
    <div id="error-msg" class="hidden bg-red-100 border border-red-400 text-red-700 px-5 py-3 rounded-2xl text-sm mb-6"></div>
    <!-- Success Message -->
    <div id="success-msg" class="hidden bg-green-100 border border-green-400 text-green-700 px-5 py-3 rounded-2xl text-sm mb-6"></div>

    <div class="space-y-6">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">New Password</label>
        <input type="password" id="new-password"
               class="w-full px-5 py-4 border border-gray-300 rounded-2xl focus:outline-none focus:border-blue-600"
               placeholder="Enter new password">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">Confirm New Password</label>
        <input type="password" id="confirm-password"
               class="w-full px-5 py-4 border border-gray-300 rounded-2xl focus:outline-none focus:border-blue-600"
               placeholder="Confirm new password">
      </div>

      <button onclick="resetPassword()" id="reset-btn"
              class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-4 rounded-2xl transition-all text-lg flex items-center justify-center">
        <span id="btn-text">Reset Password</span>
        <span id="loading-spinner" class="hidden ml-3 animate-spin">⟳</span>
      </button>

      <div class="text-center mt-6">
        <a href="/login.html" class="text-blue-600 hover:underline">Back to Login</a>
      </div>
    </div>
  </div>

  <script>
    // Get token from URL
    const urlParams = new URLSearchParams(window.location.search);
    const token = urlParams.get('token');

    if (!token) {
      const errorDiv = document.getElementById('error-msg');
      errorDiv.textContent = "Invalid or missing reset token. Please request a new reset link.";
      errorDiv.classList.remove('hidden');
    }

    async function resetPassword() {
      const newPassword = document.getElementById('new-password').value.trim();
      const confirmPassword = document.getElementById('confirm-password').value.trim();
      const errorDiv = document.getElementById('error-msg');
      const successDiv = document.getElementById('success-msg');
      const btn = document.getElementById('reset-btn');
      const btnText = document.getElementById('btn-text');
      const spinner = document.getElementById('loading-spinner');

      // Reset messages
      errorDiv.classList.add('hidden');
      successDiv.classList.add('hidden');

      // Validation
      if (!newPassword || !confirmPassword) {
        errorDiv.textContent = "Please enter and confirm your new password";
        errorDiv.classList.remove('hidden');
        return;
      }
      if (newPassword !== confirmPassword) {
        errorDiv.textContent = "Passwords do not match";
        errorDiv.classList.remove('hidden');
        return;
      }
      if (newPassword.length < 6) {
        errorDiv.textContent = "Password must be at least 6 characters long";
        errorDiv.classList.remove('hidden');
        return;
      }

      // Show loading
      btn.disabled = true;
      btnText.textContent = "Resetting...";
      spinner.classList.remove('hidden');

      try {
        const res = await fetch('/api/reset-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, newPassword })
        });

        const data = await res.json();

        if (data.success) {
          successDiv.textContent = "✅ Password reset successful! Redirecting to login...";
          successDiv.classList.remove('hidden');

          setTimeout(() => {
            window.location.href = '/login.html';
          }, 2000);
        } else {
          errorDiv.textContent = data.msg || "Failed to reset password. Please try again.";
          errorDiv.classList.remove('hidden');
        }
      } catch (err) {
        errorDiv.textContent = "Network error. Please check your connection and try again.";
        errorDiv.classList.remove('hidden');
      } finally {
        // Reset button state
        btn.disabled = false;
        btnText.textContent = "Reset Password";
        spinner.classList.add('hidden');
      }
    }
  </script>
</body>
</html>
