<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Study Planner - My PW</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        body { font-family: system-ui, sans-serif; background: #f3f4f6; }
        .task-card { transition: all 0.2s ease; border: 1px solid #e5e7eb; }
        .task-card:hover { transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        .completed { text-decoration: line-through; opacity: 0.7; }
        .priority-high { border-left: 4px solid #ef4444; }
        .priority-medium { border-left: 4px solid #f59e0b; }
        .priority-low { border-left: 4px solid #10b981; }
        .modal-content { max-height: 85vh; overflow-y: auto; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">

    <!-- Navbar -->
    <nav class="bg-white shadow-md px-8 py-4 flex items-center justify-between sticky top-0 z-50">
        <div class="flex items-center gap-3">
            <h1 class="text-3xl font-bold text-blue-600">My PW</h1>
            <span class="text-gray-500 text-sm hidden sm:inline">Study Planner</span>
        </div>
        <div class="flex items-center gap-6">
            <a href="dashboard.html" class="text-gray-600 hover:text-blue-600">Dashboard</a>
            <button onclick="logout()" class="px-5 py-2 bg-red-100 hover:bg-red-200 text-red-700 rounded-2xl font-medium flex items-center gap-2">
                <i class="fas fa-sign-out-alt"></i> Logout
            </button>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto px-6 py-10">
        <!-- Header -->
        <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-8 gap-4">
            <div>
                <h2 class="text-4xl font-bold text-gray-800">📅 My Study Planner</h2>
                <p class="text-gray-600 mt-1">Plan your studies, track progress, stay consistent</p>
            </div>
            <button onclick="openTaskModal()" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded-2xl font-medium flex items-center gap-2 shadow-md">
                <i class="fa-solid fa-plus"></i> Add New Task
            </button>
        </div>

        <!-- Filters -->
        <div class="bg-white rounded-3xl shadow-sm p-5 mb-8 flex flex-wrap gap-4 items-end">
            <div class="flex-1 min-w-[150px]">
                <label class="block text-xs font-medium text-gray-500 mb-1">Filter by Subject</label>
                <select id="filterSubject" class="w-full border border-gray-300 rounded-xl px-4 py-2 text-sm">
                    <option value="all">All Subjects</option>
                    <option value="quant">Quantitative Aptitude</option>
                    <option value="reasoning">Reasoning Ability</option>
                    <option value="english">English Language</option>
                    <option value="banking">Banking Awareness</option>
                    <option value="current">Current Affairs</option>
                    <option value="other">Other</option>
                </select>
            </div>
            <div class="flex-1 min-w-[150px]">
                <label class="block text-xs font-medium text-gray-500 mb-1">Show</label>
                <select id="filterStatus" class="w-full border border-gray-300 rounded-xl px-4 py-2 text-sm">
                    <option value="all">All Tasks</option>
                    <option value="pending">Pending</option>
                    <option value="completed">Completed</option>
                </select>
            </div>
            <button id="applyFiltersBtn" class="bg-gray-800 hover:bg-gray-900 text-white px-5 py-2 rounded-xl text-sm font-medium">Apply Filters</button>
        </div>

        <!-- Today's Tasks -->
        <div class="mb-12">
            <h3 class="text-2xl font-semibold mb-5 flex items-center gap-2">
                <i class="fas fa-sun text-yellow-500"></i> Today's Tasks
                <span id="todayDate" class="text-sm text-gray-500 font-normal ml-2"></span>
            </h3>
            <div id="todayTasksContainer" class="grid grid-cols-1 md:grid-cols-2 gap-5">
                <!-- Dynamic -->
            </div>
        </div>

        <!-- Weekly Overview (next 7 days) -->
        <div>
            <h3 class="text-2xl font-semibold mb-5 flex items-center gap-2">
                <i class="fas fa-calendar-week text-indigo-600"></i> This Week's Plan
            </h3>
            <div id="weeklyContainer" class="grid grid-cols-1 md:grid-cols-7 gap-4">
                <!-- Dynamic day cards -->
            </div>
        </div>
    </div>

    <!-- Task Modal (Add/Edit) -->
    <div id="taskModal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-[200] p-4">
        <div class="bg-white rounded-3xl w-full max-w-md modal-content shadow-2xl">
            <div class="p-6">
                <h3 id="modalTitle" class="text-2xl font-semibold mb-5 text-center">Add New Task</h3>
                <form id="taskForm">
                    <input type="hidden" id="taskId" value="">
                    <div class="mb-4">
                        <label class="block text-sm font-medium text-gray-700 mb-1">Task Title *</label>
                        <input type="text" id="taskTitle" required class="w-full border border-gray-300 rounded-2xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                    <div class="mb-4">
                        <label class="block text-sm font-medium text-gray-700 mb-1">Description (optional)</label>
                        <textarea id="taskDesc" rows="2" class="w-full border border-gray-300 rounded-2xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500"></textarea>
                    </div>
                    <div class="grid grid-cols-2 gap-4 mb-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Subject</label>
                            <select id="taskSubject" class="w-full border border-gray-300 rounded-2xl px-4 py-3">
                                <option value="quant">Quantitative Aptitude</option>
                                <option value="reasoning">Reasoning Ability</option>
                                <option value="english">English Language</option>
                                <option value="banking">Banking Awareness</option>
                                <option value="current">Current Affairs</option>
                                <option value="other">Other</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Priority</label>
                            <select id="taskPriority" class="w-full border border-gray-300 rounded-2xl px-4 py-3">
                                <option value="low">Low</option>
                                <option value="medium" selected>Medium</option>
                                <option value="high">High</option>
                            </select>
                        </div>
                    </div>
                    <div class="mb-5">
                        <label class="block text-sm font-medium text-gray-700 mb-1">Due Date *</label>
                        <input type="date" id="taskDueDate" required class="w-full border border-gray-300 rounded-2xl px-4 py-3">
                    </div>
                    <div class="flex gap-3">
                        <button type="button" onclick="closeTaskModal()" class="flex-1 py-3 border border-gray-300 rounded-2xl font-medium hover:bg-gray-50">Cancel</button>
                        <button type="submit" class="flex-1 py-3 bg-blue-600 text-white rounded-2xl font-semibold hover:bg-blue-700">Save Task</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Delete Confirmation Modal -->
    <div id="deleteModal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-[200] p-4">
        <div class="bg-white rounded-3xl w-full max-w-sm p-6 text-center">
            <i class="fas fa-exclamation-triangle text-5xl text-red-500 mb-4"></i>
            <h3 class="text-xl font-semibold mb-2">Delete Task</h3>
            <p class="text-gray-600 mb-6">Are you sure you want to delete this task? This action cannot be undone.</p>
            <div class="flex gap-3">
                <button onclick="closeDeleteModal()" class="flex-1 py-2 border border-gray-300 rounded-xl font-medium">Cancel</button>
                <button id="confirmDeleteBtn" class="flex-1 py-2 bg-red-600 text-white rounded-xl font-medium">Delete</button>
            </div>
        </div>
    </div>

    <script>
        // Global state
        let allTasks = [];
        let deleteTaskId = null;
        let currentEditTask = null;

        // Helper: format date to YYYY-MM-DD
        function formatYMD(date) {
            let d = new Date(date);
            let year = d.getFullYear();
            let month = String(d.getMonth() + 1).padStart(2, '0');
            let day = String(d.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        }

        // Fetch tasks from server
        async function fetchTasks() {
            try {
                const res = await fetch('/api/planner/tasks', { credentials: 'include' });
                if (!res.ok) throw new Error('Failed to fetch');
                allTasks = await res.json();
                applyFiltersAndRender();
            } catch (err) {
                console.error(err);
                showToast('Could not load tasks. Please refresh.', 'error');
            }
        }

        // Apply filters and render today and weekly views
        function applyFiltersAndRender() {
            const subjectFilter = document.getElementById('filterSubject').value;
            const statusFilter = document.getElementById('filterStatus').value;

            let filtered = [...allTasks];
            if (subjectFilter !== 'all') {
                filtered = filtered.filter(t => t.subject === subjectFilter);
            }
            if (statusFilter === 'pending') {
                filtered = filtered.filter(t => !t.completed);
            } else if (statusFilter === 'completed') {
                filtered = filtered.filter(t => t.completed);
            }

            renderTodayTasks(filtered);
            renderWeeklyOverview(filtered);
        }

        // Render "Today's Tasks"
        function renderTodayTasks(tasks) {
            const todayStr = formatYMD(new Date());
            const todayTasks = tasks.filter(t => formatYMD(t.dueDate) === todayStr);
            const container = document.getElementById('todayTasksContainer');
            if (todayTasks.length === 0) {
                container.innerHTML = `<div class="col-span-2 text-center py-12 text-gray-500 bg-white rounded-3xl shadow-sm">✨ No tasks due today. Enjoy some revision or add a new task!</div>`;
                return;
            }
            container.innerHTML = todayTasks.map(task => taskCardHtml(task)).join('');
            attachTaskButtons();
        }

        // Generate HTML for a single task card
        function taskCardHtml(task) {
            const isCompleted = task.completed;
            const dueDateObj = new Date(task.dueDate);
            const isOverdue = !isCompleted && dueDateObj < new Date() && formatYMD(dueDateObj) !== formatYMD(new Date());
            const priorityClass = task.priority === 'high' ? 'priority-high' : (task.priority === 'medium' ? 'priority-medium' : 'priority-low');
            const subjectName = {
                quant: 'Quant', reasoning: 'Reasoning', english: 'English', banking: 'Banking', current: 'Current Affairs', other: 'Other'
            }[task.subject] || task.subject;

            return `
                <div class="task-card bg-white rounded-2xl p-5 shadow-sm ${priorityClass} border-l-4" data-task-id="${task._id}">
                    <div class="flex justify-between items-start">
                        <div class="flex-1">
                            <div class="flex items-center gap-2 flex-wrap mb-2">
                                <span class="text-xs font-medium bg-gray-100 text-gray-600 px-2 py-1 rounded-full">${subjectName}</span>
                                <span class="text-xs font-medium ${task.priority === 'high' ? 'bg-red-100 text-red-700' : (task.priority === 'medium' ? 'bg-amber-100 text-amber-700' : 'bg-green-100 text-green-700')} px-2 py-1 rounded-full">${task.priority}</span>
                                ${isOverdue ? '<span class="text-xs bg-red-100 text-red-700 px-2 py-1 rounded-full">Overdue</span>' : ''}
                            </div>
                            <h4 class="font-semibold text-lg ${isCompleted ? 'completed' : ''}">${escapeHtml(task.title)}</h4>
                            ${task.description ? `<p class="text-sm text-gray-500 mt-1">${escapeHtml(task.description)}</p>` : ''}
                            <p class="text-xs text-gray-400 mt-2"><i class="far fa-calendar-alt mr-1"></i> Due: ${new Date(task.dueDate).toDateString()}</p>
                        </div>
                        <div class="flex flex-col items-end gap-2">
                            <input type="checkbox" class="task-complete w-5 h-5 text-green-600 rounded" ${isCompleted ? 'checked' : ''} data-id="${task._id}" data-completed="${isCompleted}">
                            <div class="flex gap-2 mt-1">
                                <button class="edit-task text-blue-500 hover:text-blue-700" data-id="${task._id}"><i class="fas fa-edit"></i></button>
                                <button class="delete-task text-red-500 hover:text-red-700" data-id="${task._id}"><i class="fas fa-trash"></i></button>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        // Render weekly overview (next 7 days, one column per day)
        function renderWeeklyOverview(tasks) {
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            const weekDays = [];
            for (let i = 0; i < 7; i++) {
                const date = new Date(today);
                date.setDate(today.getDate() + i);
                weekDays.push(date);
            }

            const container = document.getElementById('weeklyContainer');
            let html = '';
            for (let i = 0; i < weekDays.length; i++) {
                const dayDate = weekDays[i];
                const dayStr = formatYMD(dayDate);
                const dayTasks = tasks.filter(t => formatYMD(t.dueDate) === dayStr);
                const completedCount = dayTasks.filter(t => t.completed).length;
                const totalCount = dayTasks.length;
                const dayName = dayDate.toLocaleDateString('en-US', { weekday: 'short' });
                const dayNum = dayDate.getDate();

                html += `
                    <div class="bg-white rounded-2xl shadow-sm p-4 border border-gray-100">
                        <div class="text-center mb-3">
                            <p class="font-semibold text-gray-800">${dayName}</p>
                            <p class="text-2xl font-bold text-gray-700">${dayNum}</p>
                            <p class="text-xs text-gray-500 mt-1">${completedCount}/${totalCount} done</p>
                        </div>
                        <div class="space-y-2 max-h-48 overflow-y-auto">
                            ${dayTasks.slice(0, 3).map(task => `
                                <div class="text-xs p-2 rounded-lg ${task.completed ? 'bg-green-50 line-through text-gray-500' : 'bg-gray-50'}">
                                    <p class="truncate">${escapeHtml(task.title)}</p>
                                </div>
                            `).join('')}
                            ${dayTasks.length > 3 ? `<p class="text-xs text-center text-gray-400 mt-1">+${dayTasks.length-3} more</p>` : ''}
                        </div>
                    </div>
                `;
            }
            container.innerHTML = html;
        }

        // Toggle complete status
        async function toggleComplete(taskId, currentStatus) {
            try {
                const res = await fetch(`/api/planner/tasks/${taskId}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ completed: !currentStatus })
                });
                if (!res.ok) throw new Error('Update failed');
                const updated = await res.json();
                // Update local array
                const index = allTasks.findIndex(t => t._id === taskId);
                if (index !== -1) allTasks[index] = updated;
                applyFiltersAndRender();
                showToast(!currentStatus ? 'Task completed! 🎉' : 'Task marked as pending', 'success');
            } catch (err) {
                console.error(err);
                showToast('Failed to update task', 'error');
            }
        }

        // Delete task
        async function deleteTask(taskId) {
            try {
                const res = await fetch(`/api/planner/tasks/${taskId}`, {
                    method: 'DELETE',
                    credentials: 'include'
                });
                if (!res.ok) throw new Error('Delete failed');
                allTasks = allTasks.filter(t => t._id !== taskId);
                applyFiltersAndRender();
                showToast('Task deleted', 'success');
            } catch (err) {
                showToast('Could not delete task', 'error');
            }
        }

        // Open modal for add/edit
        function openTaskModal(task = null) {
            document.getElementById('modalTitle').innerText = task ? 'Edit Task' : 'Add New Task';
            document.getElementById('taskId').value = task ? task._id : '';
            document.getElementById('taskTitle').value = task ? task.title : '';
            document.getElementById('taskDesc').value = task ? (task.description || '') : '';
            document.getElementById('taskSubject').value = task ? task.subject : 'quant';
            document.getElementById('taskPriority').value = task ? task.priority : 'medium';
            const dueDate = task ? formatYMD(task.dueDate) : formatYMD(new Date());
            document.getElementById('taskDueDate').value = dueDate;
            document.getElementById('taskModal').classList.remove('hidden');
        }

        function closeTaskModal() {
            document.getElementById('taskModal').classList.add('hidden');
            document.getElementById('taskForm').reset();
        }

        // Save task (create or update)
        async function saveTask(event) {
            event.preventDefault();
            const taskId = document.getElementById('taskId').value;
            const taskData = {
                title: document.getElementById('taskTitle').value.trim(),
                description: document.getElementById('taskDesc').value.trim(),
                subject: document.getElementById('taskSubject').value,
                priority: document.getElementById('taskPriority').value,
                dueDate: document.getElementById('taskDueDate').value
            };
            if (!taskData.title) {
                alert('Title is required');
                return;
            }
            const method = taskId ? 'PUT' : 'POST';
            const url = taskId ? `/api/planner/tasks/${taskId}` : '/api/planner/tasks';
            try {
                const res = await fetch(url, {
                    method,
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify(taskData)
                });
                if (!res.ok) throw new Error('Save failed');
                const saved = await res.json();
                if (taskId) {
                    const index = allTasks.findIndex(t => t._id === taskId);
                    if (index !== -1) allTasks[index] = saved;
                } else {
                    allTasks.push(saved);
                }
                closeTaskModal();
                applyFiltersAndRender();
                showToast(taskId ? 'Task updated' : 'Task added', 'success');
            } catch (err) {
                console.error(err);
                showToast('Failed to save task', 'error');
            }
        }

        // Attach event listeners to dynamically created buttons
        function attachTaskButtons() {
            document.querySelectorAll('.task-complete').forEach(checkbox => {
                checkbox.removeEventListener('change', handleComplete);
                checkbox.addEventListener('change', handleComplete);
            });
            document.querySelectorAll('.edit-task').forEach(btn => {
                btn.removeEventListener('click', handleEdit);
                btn.addEventListener('click', handleEdit);
            });
            document.querySelectorAll('.delete-task').forEach(btn => {
                btn.removeEventListener('click', handleDelete);
                btn.addEventListener('click', handleDelete);
            });
        }

        function handleComplete(e) {
            const taskId = e.target.getAttribute('data-id');
            const currentCompleted = e.target.getAttribute('data-completed') === 'true';
            e.target.disabled = true;
            toggleComplete(taskId, currentCompleted).finally(() => e.target.disabled = false);
        }

        function handleEdit(e) {
            const taskId = e.currentTarget.getAttribute('data-id');
            const task = allTasks.find(t => t._id === taskId);
            if (task) openTaskModal(task);
        }

        function handleDelete(e) {
            const taskId = e.currentTarget.getAttribute('data-id');
            deleteTaskId = taskId;
            document.getElementById('deleteModal').classList.remove('hidden');
        }

        function closeDeleteModal() {
            document.getElementById('deleteModal').classList.add('hidden');
            deleteTaskId = null;
        }

        async function confirmDelete() {
            if (deleteTaskId) {
                await deleteTask(deleteTaskId);
                closeDeleteModal();
            }
        }

        // Simple toast notification
        function showToast(msg, type = 'info') {
            const toast = document.createElement('div');
            toast.className = `fixed bottom-5 right-5 z-[300] px-5 py-3 rounded-xl shadow-lg text-white ${type === 'success' ? 'bg-green-600' : (type === 'error' ? 'bg-red-600' : 'bg-blue-600')} transition-all duration-300`;
            toast.innerText = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        async function logout() {
            if (confirm('Logout?')) {
                await fetch('/api/logout', { method: 'POST', credentials: 'include' });
                window.location.href = '/login.html';
            }
        }

        // Set today's date display
        document.getElementById('todayDate').innerText = new Date().toDateString();

        // Event listeners
        document.getElementById('applyFiltersBtn').addEventListener('click', applyFiltersAndRender);
        document.getElementById('taskForm').addEventListener('submit', saveTask);
        document.getElementById('confirmDeleteBtn').addEventListener('click', confirmDelete);

        // Initial load
        fetchTasks();
    </script>
</body>
</html>
