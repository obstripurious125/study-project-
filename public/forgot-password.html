<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password - Project02</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">
  <div class="max-w-md w-full bg-white rounded-3xl shadow-2xl p-8 mx-4">
    <div class="text-center mb-8">
      <h1 class="text-4xl font-bold text-blue-600">Project02</h1>
      <p class="text-gray-600 mt-2">Reset Your Password</p>
    </div>

    <div id="error-msg" class="hidden bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded-2xl text-sm mb-6"></div>
    <div id="success-msg" class="hidden bg-green-100 border border-green-400 text-green-700 px-4 py-3 rounded-2xl text-sm mb-6"></div>

    <div class="space-y-6">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">Email Address</label>
        <input type="email" id="email"
               class="w-full px-4 py-3 border border-gray-300 rounded-2xl focus:outline-none focus:border-blue-600"
               placeholder="Enter your registered email">
      </div>

      <button onclick="sendResetLink()"
              class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-4 rounded-2xl transition-all text-lg">
        Send Reset Link
      </button>

      <div class="text-center">
        <a href="/login.html" class="text-blue-600 hover:underline text-sm">Back to Login</a>
      </div>
    </div>
  </div>

  <script>
    async function sendResetLink() {
      const email = document.getElementById('email').value.trim();
      const errorDiv = document.getElementById('error-msg');
      const successDiv = document.getElementById('success-msg');

      errorDiv.classList.add('hidden');
      successDiv.classList.add('hidden');

      if (!email) {
        errorDiv.textContent = "Please enter your email address";
        errorDiv.classList.remove('hidden');
        return;
      }

      try {
        const res = await fetch('/api/forgot-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email })
        });

        const data = await res.json();

        if (data.success) {
          successDiv.textContent = "Password reset link has been sent to your email (check console for now)";
          successDiv.classList.remove('hidden');
        } else {
          errorDiv.textContent = data.msg || "No account found with this email";
          errorDiv.classList.remove('hidden');
        }
      } catch (err) {
        errorDiv.textContent = "Server error. Please try again later.";
        errorDiv.classList.remove('hidden');
      }
    }
  </script>
</body>
</html>
