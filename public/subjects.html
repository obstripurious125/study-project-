<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Subjects - My PW</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    body {
      background: linear-gradient(135deg, #f8fafc 0%, #e0f2fe 100%);
      font-family: 'Inter', system-ui, sans-serif;
    }
    .subject-card {
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .subject-card:hover {
      transform: translateY(-15px);
      box-shadow: 0 30px 60px -15px rgb(37 99 235 / 0.25);
    }
    .toast {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #1f2937;
      color: white;
      padding: 12px 20px;
      border-radius: 12px;
      z-index: 9999;
      animation: slideIn 0.3s ease;
    }
    @keyframes slideIn {
      from { transform: translateX(100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
  </style>
</head>
<body class="min-h-screen">
  <nav class="bg-white border-b-2 border-blue-600 shadow-lg sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-6 py-5 flex justify-between items-center">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 bg-blue-600 rounded-2xl flex items-center justify-center text-white font-bold text-2xl">P</div>
        <div>
          <h1 class="text-2xl font-bold text-gray-800">My PW</h1>
          <p class="text-xs text-gray-500 -mt-1">By Alakh Sir Fans</p>
        </div>
      </div>
      <div class="flex items-center gap-6">
        <a href="dashboard.html" class="flex items-center gap-2 text-sm text-gray-600 hover:text-blue-600 transition">
          <i class="fas fa-home"></i>
          <span class="hidden md:inline">Dashboard</span>
        </a>
        <button id="add-subject-btn" onclick="showAddSubjectModal()"
                class="hidden flex items-center gap-2 bg-blue-600 hover:bg-blue-700 text-white px-5 py-2.5 rounded-2xl text-sm font-medium">
          <i class="fa-solid fa-plus"></i> Add Subject
        </button>
        <button id="manage-dpp-btn" onclick="window.location.href='/manage.html'"
                class="hidden flex items-center gap-2 bg-purple-600 hover:bg-purple-700 text-white px-5 py-2.5 rounded-2xl text-sm font-medium">
          <i class="fa-solid fa-pen-to-square"></i> Manage DPP
        </button>
        <div class="text-sm text-gray-600 hidden md:block">
          Welcome, <span id="user-name" class="font-semibold text-blue-600"></span>
        </div>
        <button onclick="logout()"
                class="flex items-center gap-2 bg-red-600 hover:bg-red-700 text-white px-6 py-2.5 rounded-2xl text-sm font-medium transition-all">
          <i class="fa-solid fa-right-from-bracket"></i> Logout
        </button>
      </div>
    </div>
  </nav>

  <div class="max-w-7xl mx-auto px-6 py-12">
    <div class="text-center mb-12">
      <h2 class="text-4xl font-bold text-gray-800 mb-3">Choose Your Subject</h2>
      <p class="text-gray-600 text-lg">Learn from the best teachers • Crack your exam with confidence</p>
    </div>
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8" id="subjects-container"></div>
  </div>

  <div id="add-subject-modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-[200]">
    <div class="bg-white rounded-3xl p-8 w-full max-w-md mx-4">
      <h3 class="text-2xl font-semibold mb-6 text-center">Add New Subject</h3>
      <div class="space-y-5">
        <input id="new-subject-name" type="text" placeholder="Subject Name (e.g. General Awareness)"
               class="w-full border border-gray-300 rounded-2xl px-5 py-4">
        <input id="new-subject-icon" type="text" placeholder="Icon (e.g. 🌍)"
               class="w-full border border-gray-300 rounded-2xl px-5 py-4">
        <select id="new-subject-color" class="w-full border border-gray-300 rounded-2xl px-5 py-4">
          <option value="blue">Blue</option>
          <option value="purple">Purple</option>
          <option value="pink">Pink</option>
          <option value="emerald">Emerald</option>
          <option value="orange">Orange</option>
          <option value="indigo">Indigo</option>
        </select>
      </div>
      <div class="flex gap-4 mt-8">
        <button onclick="hideAddSubjectModal()" class="flex-1 py-4 border border-gray-300 rounded-2xl font-medium">Cancel</button>
        <button onclick="addNewSubject()" class="flex-1 py-4 bg-blue-600 text-white rounded-2xl font-semibold">Add Subject</button>
      </div>
    </div>
  </div>

<script>
    let isAdmin = false;
    const colorClasses = {
      blue: { text: 'text-blue-600', bg: 'bg-blue-600' },
      purple: { text: 'text-purple-600', bg: 'bg-purple-600' },
      pink: { text: 'text-pink-600', bg: 'bg-pink-600' },
      emerald: { text: 'text-emerald-600', bg: 'bg-emerald-600' },
      orange: { text: 'text-orange-600', bg: 'bg-orange-600' },
      indigo: { text: 'text-indigo-600', bg: 'bg-indigo-600' }
    };

    const DEBUG = true;
    function log(...args) { if (DEBUG) console.log(...args); }

    function showToast(message, type = 'info') {
      const toast = document.createElement('div');
      toast.className = 'toast';
      toast.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : type === 'error' ? 'fa-exclamation-circle' : 'fa-info-circle'} mr-2"></i> ${message}`;
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 3000);
    }

    async function checkAdmin() {
      try {
        log('🔐 checkAdmin: calling /api/me');
        const res = await fetch('/api/me', { credentials: 'include' });
        const data = await res.json();
        log('🔐 checkAdmin response:', data);
        if (data.success) {
          document.getElementById('user-name').textContent = data.user.name || 'Student';
          if (data.user.role === 'admin') {
            isAdmin = true;
            document.getElementById('add-subject-btn').classList.remove('hidden');
            document.getElementById('manage-dpp-btn').classList.remove('hidden');
          }
          return true;
        } else {
          log('❌ checkAdmin failed, redirecting to login');
          window.location.href = '/login.html';
          return false;
        }
      } catch (err) {
        log('❌ checkAdmin error:', err);
        window.location.href = '/login.html';
        return false;
      }
    }

    async function renderSubjects() {
      const container = document.getElementById('subjects-container');
      container.innerHTML = '<p class="col-span-3 text-center py-12 text-gray-500">Loading subjects...</p>';

      try {
        log('📚 renderSubjects: fetching subjects');
        // 🆕 Use cache: 'no-cache' to force revalidation even with cache-busting param
        const subjectsRes = await fetch('/api/subjects?_=' + Date.now(), { 
          credentials: 'include',
          cache: 'no-cache'
        });
        if (!subjectsRes.ok) throw new Error('Failed to fetch subjects');
        const subjects = await subjectsRes.json();
        log(`📚 got ${subjects.length} subjects`);

        if (!subjects || subjects.length === 0) {
          container.innerHTML = `<p class="col-span-3 text-center py-12 text-gray-500">No subjects available. ${
            isAdmin ? 'Click "Add Subject" to create one.' : ''
          }</p>`;
          return;
        }

        // Fetch lectures in parallel
        const lecturePromises = subjects.map(sub => {
          const url = `/api/lectures?subjectId=${sub._id || sub.id}&_=${Date.now()}`;
          log(`📡 Fetching lectures for ${sub.name}: ${url}`);
          return fetch(url, { 
            credentials: 'include',
            cache: 'no-cache'               // 🆕 Force revalidation
          })
            .then(res => {
              log(`📡 Response for ${sub.name}: status ${res.status}`);
              return res.ok ? res.json() : [];
            })
            .catch(err => {
              log(`❌ Error fetching lectures for ${sub.name}:`, err);
              return [];
            });
        });

        const lecturesArrays = await Promise.all(lecturePromises);
        log('📚 lectures fetched, counts:', lecturesArrays.map(arr => arr.length));

        let html = '';
        for (let i = 0; i < subjects.length; i++) {
          const sub = subjects[i];
          const lectures = lecturesArrays[i];
          const total = lectures.length;
          const completed = lectures.filter(l => l.completed === true).length;
          const progress = total > 0 ? Math.round((completed / total) * 100) : 0;
          const color = sub.color || 'blue';
          const icon = sub.icon || '📚';
          const colorSet = colorClasses[color] || colorClasses.blue;

          html += `
            <div class="subject-card bg-white rounded-3xl p-8 border border-gray-100 relative">
              ${isAdmin ? `<button onclick="deleteSubject('${sub._id}')" class="absolute top-4 right-4 text-red-500 hover:text-red-700 text-xl"><i class="fas fa-trash"></i></button>` : ''}
              <div onclick="openSubject('${sub._id}', '${sub.name.replace(/'/g, "\\'")}')" class="cursor-pointer">
                <div class="flex justify-between items-start mb-8">
                  <div class="text-6xl">${icon}</div>
                  <div class="text-right">
                    <div class="text-sm text-gray-500">${total} Lectures</div>
                    <div class="text-5xl font-bold ${colorSet.text} mt-1">${progress}%</div>
                  </div>
                </div>
                <h3 class="text-2xl font-bold text-gray-800 mb-2">${sub.name}</h3>
                <p class="text-gray-600 mb-8">Master concepts with high-quality lectures</p>
                <div class="h-2.5 bg-gray-100 rounded-full overflow-hidden">
                  <div class="h-full ${colorSet.bg} rounded-full transition-all" style="width: ${progress}%"></div>
                </div>
              </div>
            </div>`;
        }
        container.innerHTML = html;
        log('✅ renderSubjects completed');
      } catch (err) {
        console.error('renderSubjects error:', err);
        container.innerHTML = `<p class="col-span-3 text-center py-12 text-red-500">Could not load subjects. Please refresh the page.</p>`;
      }
    }

    function openSubject(subjectId, subjectName) {
      window.location.href = `/lectures.html?subjectId=${subjectId}&subjectName=${encodeURIComponent(subjectName)}&_=${Date.now()}`;
    }

    function showAddSubjectModal() {
      document.getElementById('add-subject-modal').classList.remove('hidden');
    }

    function hideAddSubjectModal() {
      document.getElementById('add-subject-modal').classList.add('hidden');
    }

    async function addNewSubject() {
      const name = document.getElementById('new-subject-name').value.trim();
      const icon = document.getElementById('new-subject-icon').value.trim() || "📚";
      const colorSelect = document.getElementById('new-subject-color').value;

      if (!name) {
        showToast("Please enter subject name", "error");
        return;
      }

      try {
        const res = await fetch('/api/subjects', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',
          body: JSON.stringify({ name, icon, color: colorSelect })
        });

        const data = await res.json();
        if (data.success) {
          showToast(`✅ Subject "${name}" added successfully!`, "success");
          hideAddSubjectModal();
          renderSubjects();
        } else {
          showToast(data.msg || "Failed to add subject", "error");
        }
      } catch (err) {
        showToast("Server error while adding subject.", "error");
      }
    }

    async function deleteSubject(subjectId) {
      if (!confirm(`Delete this subject and all its lectures?`)) return;

      try {
        const res = await fetch(`/api/subjects/${subjectId}`, {
          method: 'DELETE',
          credentials: 'include'
        });

        const data = await res.json();
        if (data.success) {
          showToast(`Subject deleted.`, "success");
          renderSubjects();
        } else {
          showToast("Failed to delete subject", "error");
        }
      } catch (err) {
        showToast("Server error while deleting subject", "error");
      }
    }

    async function logout() {
      if (!confirm("Are you sure you want to logout?")) return;
      try {
        await fetch('/api/logout', { method: 'POST', credentials: 'include' });
        window.location.href = '/login.html';
      } catch (err) {
        alert("Logout failed.");
      }
    }

    // ---------- ROBUST PAGE INITIALIZATION (FIXED) ----------
    let isInitialized = false;

    async function initializePage() {
      log('🚀 initializePage called');
      const authSuccess = await checkAdmin();
      if (authSuccess) {
        await renderSubjects();
      }
      isInitialized = true;
    }

    // 🆕 Force a complete refresh when page is restored from bfcache
    // 🆕 Force a complete refresh when page is restored from bfcache
function handlePageShow(event) {
  log(`🔵 pageshow event, persisted: ${event.persisted}`);
  if (event.persisted) {
    // Page was restored from bfcache – re-check auth, then fetch data
    checkAdmin().then((authSuccess) => {
      if (authSuccess) renderSubjects();
    });
  }
}

// 🆕 When the page becomes visible after being hidden, refresh auth and data
function handleVisibilityChange() {
  if (document.visibilityState === 'visible') {
    log('👁️ Page became visible, refreshing auth and data');
    checkAdmin().then((authSuccess) => {
      if (authSuccess) renderSubjects();
    });
  }
}

    // Initial load
    window.addEventListener('load', () => {
      log('🟢 load event');
      initializePage();
    });

    // Back/forward cache restoration
    window.addEventListener('pageshow', handlePageShow);

    // Tab visibility change
    document.addEventListener('visibilitychange', handleVisibilityChange);

    // If the script runs after the page is already fully loaded
    if (document.readyState === 'complete') {
      log('📄 Document already complete, initializing');
      initializePage();
    }

    // 🆕 Optional: If you still experience issues, uncomment the next line
    // to force a full reload when restored from bfcache (guaranteed fix)
    // window.addEventListener('pageshow', (e) => { if (e.persisted) window.location.reload(); });
</script>  
  </body>
</html>
