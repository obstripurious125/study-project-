<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Analytics - My PW</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>
<body class="bg-gray-100">
  <nav class="bg-white shadow-md px-8 py-4 flex justify-between items-center">
    <div class="flex items-center gap-3">
      <h1 class="text-3xl font-bold text-blue-600">My PW</h1>
      <span class="text-gray-500 text-sm">Analytics</span>
    </div>
    <div class="flex gap-6">
      <a href="dashboard.html" class="text-gray-600 hover:text-blue-600">Dashboard</a>
      <button onclick="logout()" class="px-5 py-2 bg-red-100 hover:bg-red-200 text-red-700 rounded-2xl">Logout</button>
    </div>
  </nav>

  <div class="max-w-7xl mx-auto px-8 py-10">
    <h2 class="text-4xl font-bold text-gray-800 mb-2">📊 Topic Performance</h2>
    <p class="text-gray-600 mb-8">See your strengths and weaknesses at a glance</p>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
      <div class="lg:col-span-2 bg-white rounded-3xl shadow-xl p-6">
        <h3 class="text-xl font-semibold mb-4">Accuracy by Topic</h3>
        <canvas id="topicChart" height="300"></canvas>
      </div>
      <div class="bg-white rounded-3xl shadow-xl p-6">
        <h3 class="text-xl font-semibold mb-4 flex items-center gap-2"><i class="fa-solid fa-exclamation-triangle text-amber-500"></i> Weak Topics</h3>
        <div id="weakTopicsList" class="space-y-3">
          <p class="text-gray-500 text-sm">Loading...</p>
        </div>
        <button id="practiceWeakBtn" class="mt-6 w-full bg-blue-600 hover:bg-blue-700 text-white py-3 rounded-2xl font-medium">Practice Weak Topics</button>
      </div>
    </div>

    <div class="mt-12 bg-white rounded-3xl shadow-xl overflow-hidden">
      <div class="px-6 py-4 border-b bg-gray-50">
        <h3 class="font-semibold text-gray-800">Detailed Topic Breakdown</h3>
      </div>
      <div class="overflow-x-auto">
        <table class="w-full text-sm">
          <thead class="bg-gray-100">
            <tr><th class="px-6 py-3 text-left">Topic</th><th class="px-6 py-3 text-center">Questions</th><th class="px-6 py-3 text-center">Correct</th><th class="px-6 py-3 text-center">Accuracy</th></tr>
          </thead>
          <tbody id="topicTableBody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    let chartInstance = null;

    async function loadAnalytics() {
        try {
            const res = await fetch('/api/analytics/topics', { credentials: 'include' });
            let data = await res.json();

            // Ensure data is an array
            if (!Array.isArray(data)) {
                console.error('Invalid data received:', data);
                data = [];
            }

            if (data.length === 0) {
                document.getElementById('weakTopicsList').innerHTML = '<p class="text-gray-500">No topic data yet. Solve some DPPs to see analytics!</p>';
                document.getElementById('topicChart').style.display = 'none';
                return;
            }

            const topics = data.map(t => t.topic || 'Unknown');
            const accuracy = data.map(t => (t.accuracy || 0).toFixed(1));

            // Show chart only if there are topics
            document.getElementById('topicChart').style.display = 'block';
            if (chartInstance) chartInstance.destroy();
            const ctx = document.getElementById('topicChart').getContext('2d');
            chartInstance = new Chart(ctx, {
                type: 'bar',
                data: { labels: topics, datasets: [{ label: 'Accuracy (%)', data: accuracy, backgroundColor: '#3b82f6', borderRadius: 8 }] },
                options: { responsive: true, scales: { y: { min: 0, max: 100, title: { display: true, text: 'Accuracy %' } } } }
            });

            // Populate table
            const tbody = document.getElementById('topicTableBody');
            tbody.innerHTML = '';
            data.forEach(t => {
                const acc = (t.accuracy || 0).toFixed(1);
                tbody.insertAdjacentHTML('beforeend', `<tr class="border-b"><td class="px-6 py-3 font-medium">${escapeHtml(t.topic)}</td><td class="px-6 py-3 text-center">${t.totalQuestions || 0}</td><td class="px-6 py-3 text-center">${t.correct || 0}</td><td class="px-6 py-3 text-center"><span class="px-2 py-1 rounded-full text-xs ${acc < 50 ? 'bg-red-100 text-red-700' : 'bg-green-100 text-green-700'}">${acc}%</span></td></tr>`);
            });

            // Weak topics
            const weakRes = await fetch('/api/analytics/weak-topics?threshold=50', { credentials: 'include' });
            let weakTopics = await weakRes.json();
            if (!Array.isArray(weakTopics)) weakTopics = [];
            const weakList = document.getElementById('weakTopicsList');
            if (weakTopics.length === 0) {
                weakList.innerHTML = '<p class="text-green-600 text-sm">🎉 Great! No weak topics below 50%.</p>';
            } else {
                weakList.innerHTML = weakTopics.map(t => `<div class="flex justify-between items-center p-3 bg-red-50 rounded-xl"><span class="font-medium">${escapeHtml(t.topic)}</span><span class="text-red-600 font-bold">${(t.accuracy || 0).toFixed(0)}%</span></div>`).join('');
            }
            window.weakTopicsArray = weakTopics.map(t => t.topic).filter(t => t);
        } catch (err) {
            console.error('Analytics error:', err);
            document.getElementById('weakTopicsList').innerHTML = '<p class="text-red-500">Failed to load analytics. Make sure you are logged in and have solved DPPs.</p>';
        }
    }

    document.getElementById('practiceWeakBtn').addEventListener('click', () => {
      if (window.weakTopicsArray && window.weakTopicsArray.length) {
        window.location.href = `/practice.html?topics=${encodeURIComponent(window.weakTopicsArray.join(','))}`;
      } else {
        alert('No weak topics to practice. Keep solving DPPs!');
      }
    });

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    async function logout() {
      await fetch('/api/logout', { method: 'POST', credentials: 'include' });
      window.location.href = '/login.html';
    }

    window.onload = loadAnalytics;
  </script>
</body>
</html>
