<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - My PW</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <script>
    (async function() {
      try {
        const res = await fetch('/api/me', { credentials: 'include' });
        const data = await res.json();
        if (data.success) {
          window.location.replace('/dashboard.html');
          // Stop further parsing
          throw new Error('Redirecting');
        }
      } catch (err) {}
    })();
  </script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">
  <div class="max-w-md w-full bg-white rounded-3xl shadow-2xl p-8 mx-4">
    <div class="text-center mb-8">
      <h1 class="text-4xl font-bold text-blue-600">My PW</h1>
      <p class="text-gray-600 mt-2">Learn Like Physics Wallah</p>
    </div>

    <h2 class="text-2xl font-semibold text-center mb-6">Welcome Back</h2>

    <div id="message" class="hidden p-4 mb-6 rounded-2xl text-sm"></div>

    <form id="loginForm" class="space-y-6">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">Email Address</label>
        <input type="email" id="email" required
               class="w-full px-4 py-3 border border-gray-300 rounded-2xl focus:outline-none focus:border-blue-600"
               placeholder="your@email.com">
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">Password</label>
        <input type="password" id="password" required
               class="w-full px-4 py-3 border border-gray-300 rounded-2xl focus:outline-none focus:border-blue-600"
               placeholder="Enter your password">
      </div>

      <button type="submit" id="loginBtn"
              class="w-full bg-blue-600 hover:bg-blue-700 text-white py-4 rounded-2xl font-semibold text-lg flex items-center justify-center">
        <span id="btnText">Login</span>
        <span id="loadingSpinner" class="hidden ml-3 animate-spin">⟳</span>
      </button>
    </form>

    <div class="flex justify-between text-sm mt-6">
      <a href="forgot-password.html" class="text-blue-600 hover:underline">Forgot Password?</a>
      <a href="signup.html" class="text-blue-600 hover:underline">Create Account</a>
    </div>
  </div>

  <script>
    const form = document.getElementById('loginForm');
    const messageDiv = document.getElementById('message');
    const btn = document.getElementById('loginBtn');
    const btnText = document.getElementById('btnText');
    const spinner = document.getElementById('loadingSpinner');

    function showMessage(msg, isSuccess) {
      messageDiv.textContent = msg;
      messageDiv.className = `p-4 mb-6 rounded-2xl text-sm ${isSuccess ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}`;
      messageDiv.classList.remove('hidden');
      setTimeout(() => messageDiv.classList.add('hidden'), 6000);
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      btn.disabled = true;
      btnText.textContent = 'Logging in...';
      spinner.classList.remove('hidden');

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password }),
          credentials: 'include'
        });

        const data = await res.json();

        if (data.success) {
          showMessage('Login successful! Redirecting...', true);
          setTimeout(() => {
            window.location.href = 'dashboard.html';
          }, 800);
        } else {
          showMessage(data.msg || 'Invalid email or password', false);
        }
      } catch (err) {
        showMessage('Network error. Make sure server is running.', false);
        console.error(err);
      } finally {
        btn.disabled = false;
        btnText.textContent = 'Login';
        spinner.classList.add('hidden');
      }
    });
  </script>
</body>
</html>
