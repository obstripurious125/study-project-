<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Live Classes - My PW</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    /* --- unchanged styles from your original --- */
    body { font-family: system-ui, sans-serif; }
    .live-card { transition: all 0.3s ease; }
    .live-card:hover { transform: translateY(-4px); box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1); }
    .live-dot { animation: pulse 2s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    .tab-active { background-color: #2563eb !important; color: white !important; }
    .modal-content { max-height: 92vh; overflow-y: auto; }

    .video-modal-overlay {
      background: rgba(0, 0, 0, 0.85);
      backdrop-filter: blur(8px);
      z-index: 300;
    }
    .player-card {
      background: rgba(0, 0, 0, 0.65);
      backdrop-filter: blur(12px);
      border-radius: 1.5rem;
      overflow: hidden;
      box-shadow: 0 25px 40px rgba(0,0,0,0.6);
      border: 1px solid rgba(255,255,255,0.15);
      width: 90%;
      max-width: 1200px;
      display: flex;
      flex-direction: column;
    }
    @media (max-width: 640px) { .player-card { width: 98%; border-radius: 1rem; } }
    .video-stage { aspect-ratio: 16 / 9; background: #000; position: relative; flex-shrink: 0; }
    .center-play-icon {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      width: 80px; height: 80px; background: rgba(0,0,0,0.7); backdrop-filter: blur(8px);
      border-radius: 50%; display: flex; align-items: center; justify-content: center;
      color: white; font-size: 2.5rem; border: 2px solid rgba(255,255,255,0.3);
      transition: opacity 0.2s; pointer-events: none; z-index: 25; opacity: 0;
    }
    .custom-controls {
      background: rgba(0, 0, 0, 0.75); backdrop-filter: blur(12px);
      padding: 14px 20px; display: flex; flex-wrap: wrap; align-items: center; gap: 16px;
      border-top: 1px solid rgba(255,255,255,0.2);
      transition: opacity 0.3s ease, visibility 0.3s ease;
      opacity: 1; visibility: visible; min-height: 70px;
    }
    .custom-controls.hide-controls { opacity: 0; visibility: hidden; }
    .player-card:fullscreen .custom-controls { background: rgba(0, 0, 0, 0.75); backdrop-filter: blur(12px); }
    .ctrl-btn {
      background: transparent; border: none; color: #f0f0f0; width: 44px; height: 44px;
      border-radius: 40px; display: inline-flex; align-items: center; justify-content: center;
      cursor: pointer; transition: all 0.2s; font-size: 1.3rem;
    }
    .ctrl-btn:hover { background: rgba(255,255,255,0.2); transform: scale(1.05); }
    .ctrl-btn:active { transform: scale(0.96); }
    .ctrl-btn.seek-ten { width: auto; padding: 0 12px; gap: 6px; font-weight: 500; font-size: 1rem; }
    .ctrl-btn.seek-ten i { font-size: 1.1rem; }
    @media (max-width: 640px) {
      .ctrl-btn.seek-ten { padding: 0 10px; font-size: 0.85rem; }
      .ctrl-btn.seek-ten i { font-size: 0.9rem; }
    }
    .progress-bar-bg {
      flex: 1; height: 8px; background: rgba(255,255,255,0.3); border-radius: 8px;
      cursor: pointer; transition: height 0.1s;
    }
    .progress-bar-bg:hover { height: 10px; background: rgba(255,255,255,0.5); }
    .progress-fill {
      width: 0%; height: 100%; background: linear-gradient(90deg, #ff4757, #ff6b81);
      border-radius: 8px; pointer-events: none;
    }
    .time-display {
      font-family: monospace; font-size: 1rem; background: rgba(0,0,0,0.6);
      padding: 6px 12px; border-radius: 24px; letter-spacing: 0.5px; color: #fff; font-weight: 500;
    }
    .volume-slider {
      width: 90px; height: 5px; -webkit-appearance: none; background: rgba(255,255,255,0.3);
      border-radius: 5px; outline: none; cursor: pointer;
    }
    .volume-slider::-webkit-slider-thumb {
      -webkit-appearance: none; width: 16px; height: 16px; background: #ff6b81;
      border-radius: 50%; cursor: pointer; box-shadow: 0 0 2px white;
    }
    .speed-dropdown, .quality-dropdown {
      background: rgba(0,0,0,0.8); border: 1px solid rgba(255,255,255,0.3);
      color: white; padding: 8px 14px; border-radius: 32px; font-size: 0.9rem;
      font-weight: 500; cursor: pointer; outline: none; backdrop-filter: blur(4px);
    }
    .speed-dropdown option, .quality-dropdown option { background: #1f2937; color: white; }
    .loading-spinner {
      width: 48px; height: 48px; border: 4px solid rgba(255,255,255,0.2);
      border-top: 4px solid #ff6b81; border-radius: 50%; animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    @media (max-width: 640px) {
      .ctrl-btn { width: 48px; height: 48px; font-size: 1.4rem; }
      .progress-bar-bg { height: 6px; }
      .volume-slider { width: 70px; }
      .speed-dropdown, .quality-dropdown { padding: 6px 10px; font-size: 0.8rem; }
      .time-display { font-size: 0.8rem; padding: 4px 8px; }
      .custom-controls { padding: 12px 12px; gap: 12px; min-height: 60px; }
    }
    #toast-container {
      position: fixed; bottom: 20px; right: 20px; z-index: 9999;
      display: flex; flex-direction: column; gap: 10px;
    }
    .toast {
      background: #1f2937; color: white; padding: 12px 20px; border-radius: 12px;
      box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); display: flex; align-items: center;
      gap: 12px; min-width: 200px; animation: slideIn 0.3s ease; backdrop-filter: blur(8px);
      border-left: 4px solid;
    }
    .toast.success { border-left-color: #10b981; }
    .toast.error { border-left-color: #ef4444; }
    .toast.info { border-left-color: #3b82f6; }
    @keyframes slideIn {
      from { transform: translateX(100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
  </style>
</head>
<body class="bg-gray-100 min-h-screen">

  <!-- Navbar (identical) -->
  <nav class="bg-white shadow-md px-8 py-4 flex items-center justify-between">
    <div class="flex items-center gap-3">
      <h1 class="text-3xl font-bold text-blue-600">My PW</h1>
      <span class="text-gray-500 text-sm">Learn Like Physics Wallah</span>
    </div>
    <div class="flex items-center gap-6">
      <a href="dashboard.html" class="text-gray-600 hover:text-blue-600">Dashboard</a>
      <button id="add-btn" onclick="showAddModal()"
              class="hidden flex items-center gap-2 bg-blue-600 hover:bg-blue-700 text-white px-6 py-2.5 rounded-2xl text-sm font-medium">
        <i class="fa-solid fa-plus"></i> Add Schedule
      </button>
      <button onclick="logout()"
              class="px-5 py-2 bg-red-100 hover:bg-red-200 text-red-700 rounded-2xl font-medium flex items-center gap-2">
        <i class="fas fa-sign-out-alt"></i> Logout
      </button>
    </div>
  </nav>

  <div class="max-w-7xl mx-auto px-8 py-10">
    <h2 class="text-4xl font-bold text-gray-800 mb-2">Live Classes</h2>
    <p class="text-gray-600 mb-8">Today's Live Sessions</p>

    <!-- Category Tabs -->
    <div class="flex flex-wrap gap-2 mb-8 border-b pb-4" id="category-tabs"></div>

    <div id="live-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
  </div>

  <!-- Add Schedule Modal (unchanged) -->
  <div id="add-modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-[200] p-4">
    <div class="bg-white rounded-3xl w-full max-w-lg modal-content shadow-2xl">
      <div class="p-8">
        <h3 class="text-2xl font-semibold mb-6 text-center text-gray-800">Add New Live Schedule</h3>
        <div id="modal-error" class="hidden mb-6 bg-red-50 border border-red-300 text-red-700 px-5 py-4 rounded-2xl text-sm"></div>
        <div class="space-y-6">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">Lecture Title <span class="text-red-500">*</span></label>
            <input id="add-title" type="text" placeholder="Enter lecture title"
                   class="w-full border border-gray-300 rounded-2xl px-5 py-4 focus:outline-none focus:border-blue-600">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">Category <span class="text-red-500">*</span></label>
            <select id="add-category" class="w-full border border-gray-300 rounded-2xl px-5 py-4 focus:outline-none focus:border-blue-600">
              <option value="banking">Banking</option>
              <option value="quant">Quant</option>
              <option value="english">English</option>
              <option value="reasoning">Reasoning</option>
              <option value="current">Current Affairs</option>
            </select>
          </div>
          <div class="grid grid-cols-2 gap-4">
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-2">Date <span class="text-red-500">*</span></label>
              <input id="add-date" type="date" class="w-full border border-gray-300 rounded-2xl px-5 py-4 focus:outline-none focus:border-blue-600">
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-2">Time <span class="text-red-500">*</span></label>
              <input id="add-time" type="time" class="w-full border border-gray-300 rounded-2xl px-5 py-4 focus:outline-none focus:border-blue-600">
            </div>
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">Duration <span class="text-red-500">*</span></label>
            <div class="grid grid-cols-2 gap-4">
              <div>
                <input id="add-hours" type="number" min="0" max="8" placeholder="00"
                       class="w-full border border-gray-300 rounded-2xl px-5 py-4 text-center focus:outline-none focus:border-blue-600">
                <p class="text-xs text-gray-500 text-center mt-1">Hours</p>
              </div>
              <div>
                <input id="add-minutes" type="number" min="0" max="59" placeholder="00"
                       class="w-full border border-gray-300 rounded-2xl px-5 py-4 text-center focus:outline-none focus:border-blue-600">
                <p class="text-xs text-gray-500 text-center mt-1">Minutes</p>
              </div>
            </div>
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">YouTube Video ID or URL (optional)</label>
            <input id="add-youtube" type="text" placeholder="e.g. dQw4w9wgxcq or full shorts link"
                   class="w-full border border-gray-300 rounded-2xl px-5 py-4 focus:outline-none focus:border-blue-600">
          </div>
        </div>
      </div>
      <div class="border-t p-6 flex gap-4 sticky bottom-0 bg-white rounded-b-3xl">
        <button onclick="hideAddModal()" class="flex-1 py-4 border border-gray-300 rounded-2xl font-medium hover:bg-gray-50">Cancel</button>
        <button onclick="addLiveSchedule()" class="flex-1 py-4 bg-blue-600 hover:bg-blue-700 text-white rounded-2xl font-semibold">Add Schedule</button>
      </div>
    </div>
  </div>

  <!-- VIDEO PLAYER MODAL (identical to lectures page, with playsinline fix) -->
  <div id="videoPlayerModal" class="hidden fixed inset-0 video-modal-overlay flex items-center justify-center p-2 md:p-4 z-[300]">
    <div class="player-card w-full max-w-5xl">
      <div class="video-stage relative" id="videoStageContainer">
        <!-- iframe dynamically inserted here -->
        <div id="videoOverlay" class="absolute inset-0 z-20 cursor-pointer"></div>
        <div id="centerPlayIcon" class="center-play-icon"><i class="fas fa-play"></i></div>
        <div id="messagePanel" class="absolute inset-0 bg-black/80 backdrop-blur-xl z-40 flex items-center justify-center flex-col gap-4 text-white hidden">
          <div class="loading-spinner"></div>
          <div id="errorText">Loading video ...</div>
        </div>
      </div>
      <div class="custom-controls" id="customControls">
        <button class="ctrl-btn" id="playPauseBtn"><i class="fas fa-pause"></i></button>
        <button class="ctrl-btn seek-ten" id="rewind10Btn" title="Back 10 seconds"><i class="fa-solid fa-arrow-left"></i><span>10</span></button>
        <button class="ctrl-btn seek-ten" id="forward10Btn" title="Forward 10 seconds"><span>10</span><i class="fa-solid fa-arrow-right"></i></button>
        <div class="flex-1 flex items-center gap-3 min-w-[120px]">
          <div class="progress-bar-bg" id="progressBarBg"><div class="progress-fill" id="progressFill"></div></div>
          <div class="time-display" id="timeDisplay">0:00 / 0:00</div>
        </div>
        <div class="flex items-center gap-2 bg-black/40 px-3 py-1 rounded-full">
          <button class="ctrl-btn w-8 h-8" id="volumeBtn"><i class="fas fa-volume-up"></i></button>
          <input type="range" id="volumeSlider" class="volume-slider" min="0" max="100" value="70">
        </div>
        <select id="speedDropdown" class="speed-dropdown">
          <option value="0.5">0.5x</option><option value="0.75">0.75x</option><option value="1" selected>1x</option>
          <option value="1.25">1.25x</option><option value="1.5">1.5x</option><option value="2">2x</option>
        </select>
        <select id="qualityDropdown" class="quality-dropdown">
          <option value="auto">Auto</option>
          <option value="144p">144p</option><option value="240p">240p</option><option value="360p">360p</option>
          <option value="480p">480p</option><option value="720p">720p</option><option value="1080p">1080p</option>
        </select>
        <button class="ctrl-btn" id="fullscreenBtn"><i class="fas fa-expand"></i></button>
        <button class="ctrl-btn ml-auto text-white bg-white/10 rounded-full w-8 h-8" id="closeVideoModal"><i class="fas fa-times"></i></button>
      </div>
    </div>
  </div>

  <!-- Toast Container -->
  <div id="toast-container"></div>

  <script>
    // ========== TOAST NOTIFICATIONS ==========
    function showToast(message, type = 'success') {
      const container = document.getElementById('toast-container');
      const toast = document.createElement('div');
      toast.className = `toast ${type}`;
      toast.innerHTML = `<i class="fa-solid ${type === 'success' ? 'fa-circle-check' : type === 'error' ? 'fa-circle-exclamation' : 'fa-circle-info'}"></i> ${message}`;
      container.appendChild(toast);
      setTimeout(() => {
        toast.style.opacity = '0';
        toast.style.transform = 'translateX(100%)';
        setTimeout(() => toast.remove(), 300);
      }, 3000);
    }

    // ========== LIVE CLASSES LOGIC ==========
    let isAdmin = false;
    let currentCategory = 'all';

    async function checkAdmin() {
      try {
        const res = await fetch('/api/me', { credentials: 'include' });
        const data = await res.json();
        if (data.success && data.user.role === 'admin') {
          isAdmin = true;
          document.getElementById('add-btn').classList.remove('hidden');
        }
      } catch (e) {}
    }

    async function loadLiveClasses(category = 'all') {
      currentCategory = category;
      const today = new Date().toISOString().split('T')[0];
      try {
        const res = await fetch(`/api/live/today?date=${today}`, { credentials: 'include' });
        let lives = await res.json();
        if (category !== 'all') lives = lives.filter(l => l.category === category);

        let html = '';
        if (lives.length === 0) {
          html = `<p class="col-span-3 text-center text-gray-500 py-20">No live classes scheduled for today.</p>`;
        } else {
          lives.forEach(live => {
            const hours = Math.floor((live.duration || 45) / 60);
            const minutes = (live.duration || 45) % 60;
            const durationStr = hours > 0 ? `${hours} hr ${minutes} min` : `${minutes} min`;

            const startTime = new Date(`${live.date} ${live.time}`);
            const endTime = new Date(startTime.getTime() + (live.duration || 45) * 60000);
            const now = new Date();

            let status = '';
            if (now < startTime) status = 'Upcoming';
            else if (now >= startTime && now <= endTime) status = 'LIVE';
            else status = 'Completed';

            // Save the raw youtubeId to pass to playVideo (will be cleaned there)
            const rawYt = live.youtubeId || '';

            let btnHTML = '';
            if (status === 'Upcoming') {
              btnHTML = `<button onclick="notifyMe('${live.title}')" class="w-full py-3.5 bg-amber-600 hover:bg-amber-700 text-white rounded-2xl font-medium">Notify Me</button>`;
            } else if (status === 'LIVE') {
              btnHTML = `<button onclick="playVideo('${rawYt}')" class="w-full py-3.5 bg-red-600 hover:bg-red-700 text-white rounded-2xl font-medium flex items-center justify-center gap-2"><span class="live-dot w-3 h-3 bg-white rounded-full"></span> Join Live Now</button>`;
            } else {
              btnHTML = `<button onclick="playVideo('${rawYt}')" class="w-full py-3.5 bg-green-600 hover:bg-green-700 text-white rounded-2xl font-medium">Watch Recording</button>`;
            }

            html += `
              <div class="live-card bg-white rounded-3xl shadow-xl p-6 border border-gray-100">
                <div class="flex justify-between items-start">
                  <div>
                    <span class="px-4 py-1 text-xs font-medium rounded-2xl ${status === 'LIVE' ? 'bg-red-100 text-red-700' : status === 'Completed' ? 'bg-green-100 text-green-700' : 'bg-amber-100 text-amber-700'}">
                      ${status}
                    </span>
                    <h4 class="font-semibold text-lg mt-4">${live.title}</h4>
                    <p class="text-sm text-gray-500">${live.time} • ${durationStr}</p>
                  </div>
                  ${isAdmin ? `<button onclick="deleteLive('${live._id}')" class="text-red-500 hover:text-red-700 text-xl"><i class="fas fa-trash"></i></button>` : ''}
                </div>
                <div class="mt-8">${btnHTML}</div>
              </div>`;
          });
        }
        document.getElementById('live-container').innerHTML = html;
        renderCategoryTabs();
      } catch (err) { console.error(err); }
    }

    function renderCategoryTabs() {
      const categories = ['all', 'banking', 'quant', 'english', 'reasoning', 'current'];
      let html = `<button onclick="filterCategory('all')" class="tab px-6 py-2 rounded-3xl text-sm font-medium ${currentCategory === 'all' ? 'tab-active bg-blue-600 text-white' : 'bg-white border'}">All</button>`;
      categories.slice(1).forEach(cat => {
        html += `<button onclick="filterCategory('${cat}')" class="tab px-6 py-2 bg-white hover:bg-gray-100 text-gray-700 rounded-3xl text-sm font-medium border ${currentCategory === cat ? 'tab-active bg-blue-600 text-white' : ''}">${cat.charAt(0).toUpperCase() + cat.slice(1)}</button>`;
      });
      document.getElementById('category-tabs').innerHTML = html;
    }

    function filterCategory(cat) { loadLiveClasses(cat); }

    function showAddModal() {
      document.getElementById('add-modal').classList.remove('hidden');
      document.getElementById('modal-error').classList.add('hidden');
      document.getElementById('add-date').value = new Date().toISOString().split('T')[0];
      document.getElementById('add-hours').value = '';
      document.getElementById('add-minutes').value = '';
    }
    function hideAddModal() { document.getElementById('add-modal').classList.add('hidden'); }
    function showModalError(msg) {
      const errorDiv = document.getElementById('modal-error');
      errorDiv.textContent = msg;
      errorDiv.classList.remove('hidden');
      errorDiv.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }

    async function addLiveSchedule() {
      const title = document.getElementById('add-title').value.trim();
      const category = document.getElementById('add-category').value;
      const date = document.getElementById('add-date').value;
      const time = document.getElementById('add-time').value;
      const hours = parseInt(document.getElementById('add-hours').value) || 0;
      const minutes = parseInt(document.getElementById('add-minutes').value) || 0;
      const youtubeInput = document.getElementById('add-youtube').value.trim();
      const totalDuration = (hours * 60) + minutes;
      document.getElementById('modal-error').classList.add('hidden');
      if (!title) { showModalError("⚠️ Please enter the lecture title"); return; }
      if (!date || !time) { showModalError("⚠️ Please select date and time"); return; }
      if (totalDuration <= 0) { showModalError("⚠️ Please specify duration (Hours or Minutes)"); return; }
      const scheduledTime = new Date(`${date} ${time}`);
      if (scheduledTime < new Date()) { showModalError("⚠️ You cannot schedule a live class in the past!"); return; }

      // Clean up YouTube ID before storing
      const cleanId = extractYouTubeId(youtubeInput);

      try {
        await fetch('/api/live', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ title, category, date, time, duration: totalDuration, youtubeId: cleanId }),
          credentials: 'include'
        });
        hideAddModal();
        loadLiveClasses(currentCategory);
        showToast("✅ Live schedule added successfully!", "success");
      } catch (err) { showToast("❌ Failed to add schedule", "error"); }
    }

    async function deleteLive(id) {
      if (!confirm("Delete this live schedule?")) return;
      try {
        await fetch(`/api/live/${id}`, { method: 'DELETE', credentials: 'include' });
        loadLiveClasses(currentCategory);
        showToast("✅ Schedule deleted successfully!", "success");
      } catch (err) { showToast("❌ Failed to delete schedule", "error"); }
    }

    function notifyMe(title) { showToast(`🛎️ You will be notified when "${title}" starts!`, "info"); }

    async function logout() {
      if (!confirm("Are you sure you want to logout?")) return;
      await fetch('/api/logout', { method: 'POST', credentials: 'include' });
      window.location.href = 'login.html';
    }

    // ========== YouTube ID Extractor (handles normal videos, shorts, any URL) ==========
    function extractYouTubeId(input) {
      if (!input) return '';
      // Already a pure 11-character ID
      if (/^[a-zA-Z0-9_-]{11}$/.test(input)) return input;
      // Shorts link (e.g. https://youtube.com/shorts/abc123?feature=share)
      const shortsMatch = input.match(/youtube\.com\/shorts\/([a-zA-Z0-9_-]{11})/);
      if (shortsMatch) return shortsMatch[1];
      // Other common patterns
      const patterns = [
        /youtube\.com\/watch\?v=([a-zA-Z0-9_-]{11})/,
        /youtu\.be\/([a-zA-Z0-9_-]{11})/,
        /youtube\.com\/embed\/([a-zA-Z0-9_-]{11})/,
        /youtube\.com\/v\/([a-zA-Z0-9_-]{11})/
      ];
      for (const p of patterns) {
        const match = input.match(p);
        if (match) return match[1];
      }
      return ''; // invalid input
    }

    // ========== ADVANCED VIDEO PLAYER (same as lectures page) ==========
    let player = null;
    let playerReady = false;
    let currentVideoId = null;
    let progressInterval = null;
    let isDraggingProgress = false;
    let currentVolume = 70;
    let isMuted = false;
    let currentPlaybackRate = 1;
    let controlsHideTimeout = null;
    let isCreatingPlayer = false;

    const modal = document.getElementById('videoPlayerModal');
    const videoStageContainer = document.getElementById('videoStageContainer');
    const overlayVideo = document.getElementById('videoOverlay');
    const playPauseBtn = document.getElementById('playPauseBtn');
    const progressBarBg = document.getElementById('progressBarBg');
    const progressFill = document.getElementById('progressFill');
    const timeDisplaySpan = document.getElementById('timeDisplay');
    const volumeBtn = document.getElementById('volumeBtn');
    const volumeSlider = document.getElementById('volumeSlider');
    const speedDropdown = document.getElementById('speedDropdown');
    const qualityDropdown = document.getElementById('qualityDropdown');
    const fullscreenBtn = document.getElementById('fullscreenBtn');
    const centerIconDiv = document.getElementById('centerPlayIcon');
    const messagePanel = document.getElementById('messagePanel');
    const errorTextSpan = document.getElementById('errorText');
    const closeModalBtn = document.getElementById('closeVideoModal');
    const customControls = document.getElementById('customControls');
    const rewind10Btn = document.getElementById('rewind10Btn');
    const forward10Btn = document.getElementById('forward10Btn');

    function resetControlsHideTimer() {
      if (customControls) {
        customControls.classList.remove('hide-controls');
        if (controlsHideTimeout) clearTimeout(controlsHideTimeout);
        controlsHideTimeout = setTimeout(() => {
          if (player && playerReady && !isDraggingProgress && customControls) {
            customControls.classList.add('hide-controls');
          }
        }, 2000);
      }
    }
    function showControls() {
      if (customControls) {
        customControls.classList.remove('hide-controls');
        resetControlsHideTimer();
      }
    }
    function bindControlEvents() {
      const stage = document.querySelector('#videoPlayerModal .video-stage');
      if (stage) {
        stage.removeEventListener('mousemove', showControls);
        stage.removeEventListener('click', showControls);
        stage.removeEventListener('touchstart', showControls);
        stage.addEventListener('mousemove', showControls);
        stage.addEventListener('click', showControls);
        stage.addEventListener('touchstart', showControls);
      }
      if (customControls) {
        customControls.removeEventListener('mouseenter', null);
        customControls.removeEventListener('mouseleave', null);
        customControls.addEventListener('mouseenter', () => {
          if (controlsHideTimeout) clearTimeout(controlsHideTimeout);
          customControls.classList.remove('hide-controls');
        });
        customControls.addEventListener('mouseleave', resetControlsHideTimer);
      }
    }
    function destroyPlayer() {
      if (progressInterval) { clearInterval(progressInterval); progressInterval = null; }
      if (player) {
        try { player.pauseVideo(); player.destroy(); } catch(e) { console.warn(e); }
        player = null;
      }
      playerReady = false;
      const existingIframe = document.getElementById('youtubeIframe');
      if (existingIframe) existingIframe.remove();
      isCreatingPlayer = false;
    }
    function createFreshIframe() {
      const iframe = document.createElement('iframe');
      iframe.id = 'youtubeIframe';
      iframe.className = 'absolute inset-0 w-full h-full border-0 pointer-events-none';
      // ---------- IMPORTANT FIX: allow playsinline to prevent app redirect ----------
      iframe.allow = 'autoplay; fullscreen; encrypted-media; picture-in-picture; web-share; playsinline';
      iframe.allowFullscreen = true;
      return iframe;
    }
    function loadYouTubeAPI() {
      if (window.YT && window.YT.Player) { createPlayer(currentVideoId); return; }
      const tag = document.createElement('script');
      tag.src = 'https://www.youtube.com/iframe_api';
      document.head.appendChild(tag);
      window.onYouTubeIframeAPIReady = () => createPlayer(currentVideoId);
    }
    function createPlayer(videoId) {
      if (isCreatingPlayer) return;
      isCreatingPlayer = true;
      destroyPlayer();
      const newIframe = createFreshIframe();
      videoStageContainer.insertBefore(newIframe, videoStageContainer.firstChild);
      const params = {
        controls: 0,
        disablekb: 1,
        modestbranding: 1,
        rel: 0,
        showinfo: 0,
        iv_load_policy: 3,
        fs: 0,
        playsinline: 1,  // also in URL, crucial for iOS
        enablejsapi: 1,
        origin: window.location.origin
      };
      newIframe.src = `https://www.youtube.com/embed/${videoId}?${new URLSearchParams(params).toString()}`;
      player = new YT.Player('youtubeIframe', {
        events: { onReady: onPlayerReady, onStateChange: onPlayerStateChange, onError: onPlayerError }
      });
    }
    function onPlayerReady(e) {
      playerReady = true;
      isCreatingPlayer = false;
      messagePanel.classList.add('hidden');
      player.setVolume(currentVolume);
      volumeSlider.value = currentVolume;
      updateVolumeIcon(currentVolume);
      player.setPlaybackRate(currentPlaybackRate);
      speedDropdown.value = currentPlaybackRate;
      startProgressTimer();
      player.playVideo();
      bindControlEvents();
      resetControlsHideTimer();
    }
    function onPlayerStateChange(e) {
      const state = e.data;
      const isPlaying = (state === YT.PlayerState.PLAYING);
      playPauseBtn.innerHTML = isPlaying ? '<i class="fas fa-pause"></i>' : '<i class="fas fa-play"></i>';
      if (isPlaying) centerIconDiv.style.opacity = '0';
      else if (state === YT.PlayerState.PAUSED) { centerIconDiv.style.opacity = '0.95'; centerIconDiv.innerHTML = '<i class="fas fa-play"></i>'; }
      else if (state === YT.PlayerState.ENDED) { centerIconDiv.innerHTML = '<i class="fas fa-rotate-right"></i>'; centerIconDiv.style.opacity = '0.95'; }
      else centerIconDiv.style.opacity = '0';
      updateTimeDisplay();
      if (isPlaying) resetControlsHideTimer();
    }
    function onPlayerError(error) {
      console.error(error);
      errorTextSpan.innerText = '⚠️ Failed to load video. Invalid ID or restricted content.';
      messagePanel.classList.remove('hidden');
      playerReady = false;
      isCreatingPlayer = false;
    }
    function updateTimeDisplay() {
      if (!player || !playerReady) return;
      const duration = player.getDuration();
      const current = player.getCurrentTime();
      if (duration && isFinite(duration)) {
        timeDisplaySpan.innerText = `${formatTime(current)} / ${formatTime(duration)}`;
        if (!isDraggingProgress) progressFill.style.width = `${(current / duration) * 100}%`;
      } else { timeDisplaySpan.innerText = `0:00 / 0:00`; }
    }
    function formatTime(seconds) {
      if (isNaN(seconds)) return "0:00";
      const hrs = Math.floor(seconds / 3600);
      const mins = Math.floor((seconds % 3600) / 60);
      const secs = Math.floor(seconds % 60);
      if (hrs > 0) return `${hrs}:${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}`;
      return `${mins}:${secs.toString().padStart(2,'0')}`;
    }
    function startProgressTimer() {
      if (progressInterval) clearInterval(progressInterval);
      progressInterval = setInterval(() => { if (player && playerReady && !isDraggingProgress) updateTimeDisplay(); }, 250);
    }
    function seekToPosition(e) {
      if (!player || !playerReady) return;
      const rect = progressBarBg.getBoundingClientRect();
      let percent = Math.min(1, Math.max(0, (e.clientX - rect.left) / rect.width));
      const duration = player.getDuration();
      if (duration && isFinite(duration)) { player.seekTo(percent * duration, true); updateTimeDisplay(); }
      showControls();
    }
    function handleProgressDragStart(e) {
      if (!player || !playerReady) return;
      isDraggingProgress = true;
      seekToPosition(e);
      const onMove = (move) => seekToPosition(move);
      const onUp = () => { isDraggingProgress = false; updateTimeDisplay(); document.removeEventListener('mousemove', onMove); document.removeEventListener('mouseup', onUp); showControls(); };
      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', onUp);
    }
    function setVolume(value) {
      let vol = Math.min(100, Math.max(0, parseInt(value)));
      currentVolume = vol;
      if (player && playerReady) player.setVolume(vol);
      volumeSlider.value = vol;
      updateVolumeIcon(vol);
      isMuted = (vol === 0);
      showControls();
    }
    function toggleMute() {
      if (!player || !playerReady) return;
      if (isMuted || currentVolume === 0) {
        let newVol = currentVolume > 0 ? currentVolume : 70;
        player.setVolume(newVol);
        volumeSlider.value = newVol;
        currentVolume = newVol;
        isMuted = false;
      } else { player.setVolume(0); volumeSlider.value = 0; isMuted = true; }
      updateVolumeIcon(isMuted ? 0 : currentVolume);
      showControls();
    }
    function updateVolumeIcon(vol) {
      if (vol === 0) volumeBtn.innerHTML = '<i class="fas fa-volume-mute"></i>';
      else if (vol < 40) volumeBtn.innerHTML = '<i class="fas fa-volume-down"></i>';
      else volumeBtn.innerHTML = '<i class="fas fa-volume-up"></i>';
    }
    function changeSpeed() {
      const newSpeed = parseFloat(speedDropdown.value);
      if (!player || !playerReady) return;
      currentPlaybackRate = newSpeed;
      player.setPlaybackRate(newSpeed);
      showControls();
    }
    function changeQuality() {
      const quality = qualityDropdown.value;
      if (!player || !playerReady) return;
      if (quality === 'auto') player.setPlaybackQuality('auto');
      else player.setPlaybackQuality(quality);
      showControls();
    }
    function toggleFullscreen() {
      const container = document.querySelector('#videoPlayerModal .player-card');
      if (!document.fullscreenElement) container.requestFullscreen().catch(e => console.warn(e));
      else document.exitFullscreen();
      showControls();
    }
    function closeVideoModal() {
      if (document.fullscreenElement) document.exitFullscreen();
      destroyPlayer();
      modal.classList.add('hidden');
      if (controlsHideTimeout) clearTimeout(controlsHideTimeout);
      document.body.style.overflow = '';
      const leftoverIframe = document.getElementById('youtubeIframe');
      if (leftoverIframe) leftoverIframe.remove();
    }
    function handleVideoKeys(e) {
      if (modal.classList.contains('hidden')) return;
      if (!player || !playerReady) return;
      const tag = e.target.tagName;
      if (tag === 'INPUT' || tag === 'BUTTON' || tag === 'SELECT') return;
      switch(e.key) {
        case ' ': case 'Space': e.preventDefault(); (player.getPlayerState() === YT.PlayerState.PLAYING) ? player.pauseVideo() : player.playVideo(); showControls(); break;
        case 'ArrowLeft': e.preventDefault(); player.seekTo(Math.max(0, player.getCurrentTime() - 5), true); updateTimeDisplay(); showControls(); break;
        case 'ArrowRight': e.preventDefault(); player.seekTo(Math.min(player.getDuration(), player.getCurrentTime() + 5), true); updateTimeDisplay(); showControls(); break;
        case 'ArrowUp': e.preventDefault(); setVolume(currentVolume + 5); break;
        case 'ArrowDown': e.preventDefault(); setVolume(currentVolume - 5); break;
        case 'f': case 'F': e.preventDefault(); toggleFullscreen(); break;
      }
    }

    // 10s seek buttons
    if (rewind10Btn) rewind10Btn.addEventListener('click', () => {
      if (!player || !playerReady) { showToast("Video not ready", "info"); return; }
      let newTime = Math.max(0, player.getCurrentTime() - 10);
      player.seekTo(newTime, true); updateTimeDisplay(); showControls();
    });
    if (forward10Btn) forward10Btn.addEventListener('click', () => {
      if (!player || !playerReady) { showToast("Video not ready", "info"); return; }
      let newTime = Math.min(player.getDuration(), player.getCurrentTime() + 10);
      player.seekTo(newTime, true); updateTimeDisplay(); showControls();
    });

    playPauseBtn.addEventListener('click', () => { if (player && playerReady) { (player.getPlayerState() === YT.PlayerState.PLAYING) ? player.pauseVideo() : player.playVideo(); showControls(); } });
    progressBarBg.addEventListener('click', seekToPosition);
    progressBarBg.addEventListener('mousedown', handleProgressDragStart);
    volumeSlider.addEventListener('input', (e) => setVolume(e.target.value));
    volumeBtn.addEventListener('click', toggleMute);
    fullscreenBtn.addEventListener('click', toggleFullscreen);
    overlayVideo.addEventListener('click', () => { if (player && playerReady) { (player.getPlayerState() === YT.PlayerState.PLAYING) ? player.pauseVideo() : player.playVideo(); showControls(); } });
    overlayVideo.addEventListener('dblclick', toggleFullscreen);
    closeModalBtn.addEventListener('click', closeVideoModal);
    document.addEventListener('keydown', handleVideoKeys);
    window.addEventListener('fullscreenchange', () => {
      fullscreenBtn.innerHTML = document.fullscreenElement ? '<i class="fas fa-compress"></i>' : '<i class="fas fa-expand"></i>';
      if (!document.fullscreenElement) document.body.style.overflow = '';
    });
    speedDropdown.addEventListener('change', changeSpeed);
    qualityDropdown.addEventListener('change', changeQuality);

    // ---------- PUBLIC VIDEO PLAYER FUNCTION ----------
    function playVideo(rawInput) {
      const videoId = extractYouTubeId(rawInput);
      if (!videoId) {
        showToast("No valid YouTube video ID found. Please check the link.", "error");
        return;
      }
      closeVideoModal();  // destroy any existing player
      // Short delay ensures DOM cleanup before building new iframe
      setTimeout(() => {
        currentVideoId = videoId;
        modal.classList.remove('hidden');
        messagePanel.classList.remove('hidden');
        errorTextSpan.innerText = "Loading video...";
        centerIconDiv.style.opacity = '0';
        if (window.YT && window.YT.Player) createPlayer(videoId);
        else loadYouTubeAPI();
      }, 150);
    }

    window.onload = async () => {
      await checkAdmin();
      renderCategoryTabs();
      loadLiveClasses('all');
      setInterval(() => loadLiveClasses(currentCategory), 30000);
    };
  </script>
</body>
</html>
