<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up - Project02</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    (async function() {
      try {
        const res = await fetch('/api/me', { credentials: 'include' });
        const data = await res.json();
        if (data.success) {
          window.location.replace('/dashboard.html');
          // Stop further parsing
          throw new Error('Redirecting');
        }
      } catch (err) {}
    })();
  </script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">
  <div class="max-w-md w-full bg-white rounded-3xl shadow-2xl p-8 mx-4">
    <div class="text-center mb-8">
      <h1 class="text-4xl font-bold text-blue-600">Project02</h1>
      <p class="text-gray-600 mt-2">Create your student account</p>
    </div>

    <h2 class="text-2xl font-semibold text-center mb-6">Sign Up</h2>

    <!-- Step 1: Enter Details -->
    <div id="step1">
      <div class="space-y-6">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Full Name</label>
          <input type="text" id="name" required
                 class="w-full px-4 py-3 border border-gray-300 rounded-2xl focus:outline-none focus:border-blue-600"
                 placeholder="Enter your full name">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Email Address</label>
          <input type="email" id="email" required
                 class="w-full px-4 py-3 border border-gray-300 rounded-2xl focus:outline-none focus:border-blue-600"
                 placeholder="your@email.com">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Password</label>
          <input type="password" id="password" required
                 class="w-full px-4 py-3 border border-gray-300 rounded-2xl focus:outline-none focus:border-blue-600"
                 placeholder="Create a strong password">
        </div>
      </div>

      <button onclick="sendOTP()"
              class="w-full mt-8 bg-blue-600 hover:bg-blue-700 text-white py-4 rounded-2xl font-semibold text-lg">
        Send OTP
      </button>
    </div>

    <!-- Step 2: Enter OTP -->
    <div id="step2" class="hidden">
      <div class="space-y-6">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Enter 6-digit OTP</label>
          <input type="text" id="otp" maxlength="6" required
                 class="w-full px-4 py-3 border border-gray-300 rounded-2xl focus:outline-none focus:border-blue-600 text-center text-2xl tracking-widest"
                 placeholder="123456">
        </div>
        <div id="otp-message" class="text-center text-sm"></div>
      </div>

      <button onclick="verifyOTPAndSignup()"
              class="w-full mt-8 bg-green-600 hover:bg-green-700 text-white py-4 rounded-2xl font-semibold text-lg">
        Verify OTP & Create Account
      </button>

      <button onclick="backToStep1()"
              class="w-full mt-4 text-gray-600 hover:text-gray-800">
        ← Back
      </button>
    </div>

    <div id="final-message" class="mt-6 text-center text-sm hidden"></div>

    <div class="text-center mt-8">
      <p class="text-gray-600">Already have an account?
        <a href="/login.html" class="text-blue-600 hover:underline">Login here</a>
      </p>
    </div>
  </div>

  <script>
    let currentEmail = '';

    async function sendOTP() {
      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      if (!name || !email || !password) {
        alert("Please fill all fields");
        return;
      }

      currentEmail = email;

      try {
        const res = await fetch('/api/send-otp', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email })
        });

        const data = await res.json();

        if (data.success) {
          document.getElementById('step1').classList.add('hidden');
          document.getElementById('step2').classList.remove('hidden');
        } else {
          alert(data.msg || "Failed to send OTP");
        }
      } catch (err) {
        alert("Server error. Please try again.");
      }
    }

    async function verifyOTPAndSignup() {
      const name = document.getElementById('name').value.trim();
      const email = currentEmail;
      const password = document.getElementById('password').value;
      const otp = document.getElementById('otp').value.trim();

      if (!otp || otp.length !== 6) {
        alert("Please enter valid 6-digit OTP");
        return;
      }

      try {
        const res = await fetch('/api/signup', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, email, password, otp })
        });

        const data = await res.json();

        const finalMsg = document.getElementById('final-message');
        finalMsg.classList.remove('hidden');

        if (data.success) {
          finalMsg.innerHTML = `<span class="text-green-600">${data.msg}</span>`;
          setTimeout(() => {
            window.location.href = '/login.html';
          }, 2000);
        } else {
          finalMsg.innerHTML = `<span class="text-red-600">${data.msg}</span>`;
        }
      } catch (err) {
        alert("Server error during verification");
      }
    }

    function backToStep1() {
      document.getElementById('step2').classList.add('hidden');
      document.getElementById('step1').classList.remove('hidden');
      document.getElementById('final-message').classList.add('hidden');
    }
  </script>
</body>
</html>
